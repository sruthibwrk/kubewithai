kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: demo1
networking:
  # This allows kubectl from your laptop to talk to the EC2 public IP
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
nodes:
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 8080
    listenAddress: "0.0.0.0" # Recommended for clarity
    protocol: TCP
  - containerPort: 443
    hostPort: 8443
    listenAddress: "0.0.0.0"
    protocol: TCP
  - containerPort: 30007
    hostPort: 30007
    listenAddress: "0.0.0.0"
- role: worker
